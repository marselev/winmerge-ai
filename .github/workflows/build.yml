name: Build WinMerge AI
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout WinMerge
        uses: actions/checkout@v4
        with:
          repository: winmerge/winmerge
          path: winmerge

      - name: Checkout AI Files
        uses: actions/checkout@v4
        with:
          path: ai-files

      - name: Copy AI Files
        shell: cmd
        run: |
          copy ai-files\AIAutoMerge.h winmerge\Src\
          copy ai-files\AIAutoMerge.cpp winmerge\Src\
          copy ai-files\PropAIAutoMerge.h winmerge\Src\
          copy ai-files\PropAIAutoMerge.cpp winmerge\Src\

      - name: Apply Patches
        shell: pwsh
        run: |
          cd winmerge
          $opt1 = "`ninline const String OPT_AI_AUTO_MERGE_ENABLED{ _T(`"Settings/AiAutoMergeEnabled`"s) };"
          $opt2 = "inline const String OPT_AI_AUTO_MERGE_STRATEGY{ _T(`"Settings/AiAutoMergeStrategy`"s) };"
          Add-Content Src/OptionsDef.h $opt1
          Add-Content Src/OptionsDef.h $opt2
          $content = Get-Content Src/OptionsInit.cpp -Raw
          $content = $content -replace '(pOptions->InitOption\(OPT_ASK_MULTIWINDOW_CLOSE, true\);)', "`$1`n`tpOptions->InitOption(OPT_AI_AUTO_MERGE_ENABLED, false);`n`tpOptions->InitOption(OPT_AI_AUTO_MERGE_STRATEGY, 1);"
          Set-Content Src/OptionsInit.cpp $content -NoNewline

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore Packages
        run: |
          cd winmerge
          nuget restore WinMerge.sln

      - name: Build WinMerge
        run: |
          cd winmerge
          msbuild WinMerge.sln /p:Configuration=Release /p:Platform=x64 /m /v:minimal

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: WinMerge-AI-x64
          path: |
            winmerge/Build/x64/Release/WinMergeU.exe
            winmerge/Build/x64/Release/*.dll
