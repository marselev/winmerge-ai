name: Apply Patches and Build WinMerge AI

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout Patches
        uses: actions/checkout@v4
        with:
          path: patches

      - name: Checkout WinMerge
        uses: actions/checkout@v4
        with:
          repository: winmerge/winmerge
          path: winmerge

      - name: Apply Patches
        shell: pwsh
        run: |
          Copy-Item "patches/AIAutoMerge.h" "winmerge/Src/" -Force
          Copy-Item "patches/AIAutoMerge.cpp" "winmerge/Src/" -Force
          Copy-Item "patches/PropAIAutoMerge.h" "winmerge/Src/" -Force
          Copy-Item "patches/PropAIAutoMerge.cpp" "winmerge/Src/" -Force
          cd winmerge
          Get-ChildItem "../patches/*.patch" | ForEach-Object {
            git apply $_.FullName 2>$null
          }

      - name: Build
        uses: microsoft/setup-msbuild@v2
      - run: |
          cd winmerge
          nuget restore WinMerge.sln
          msbuild WinMerge.sln /p:Configuration=Release /p:Platform=x64 /m

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: WinMerge-AI
          path: winmerge/Build/x64/Release/WinMergeU.exe
